name: Impromptu Speaking Bot

on:
  schedule:
    - cron: "30 23 * * *" # 5:00 AM IST (23:30 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot

      - name: Run Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        run: python bot.py

      - name: Commit Changes
        run: |
          git config --global user.name "impromptu-bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add .
          git commit -m "Update users and rotate images" || echo "No changes"
          git push
